<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Creative Transform Transitions</title>
  <!-- <link rel="stylesheet" href="style.css" /> -->
    <style>
        * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
        }

        body {
        background: linear-gradient(135deg, #1e1e2f, #2a2a40);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        }

        .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 2rem;
        width: 90%;
        max-width: 1000px;
        padding: 2rem;
        }

        .card {
        background: #fff;
        border-radius: 12px;
        padding: 2rem 1rem;
        text-align: center;
        font-size: 1.2rem;
        font-weight: bold;
        color: #333;
        cursor: pointer;
        transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); /* Easing for bounce effect */
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        /* perspective: 1000px; */
        }

        /* TRANSFORMS ON HOVER */

        .card.scale:hover {
        transform: scale(1.2);
        background: #ff9a8b;
        color: white;
        }

        .card.rotate:hover {
        transform: rotate(15deg);
        background: #a1c4fd;
        color: white;
        }

        .card.translate:hover {
        transform: translateY(-20px) translateX(10px);
        background: #fbc2eb;
        color: white;
        }

        .card.skew:hover {
        transform: skewX(20deg) skewY(10deg);
        background: #ffecd2;
        color: #333;
        }

        .card.perspective:hover {
        transform: rotateY(30deg) rotateX(10deg) scale(1.1);
        background: #c2e9fb;
        color: #000;
        }
    </style>
</head>
<body>
  <div class="container">
    <div class="card scale">Scale</div>
    <div class="card rotate">Rotate</div>
    <div class="card translate">Translate</div>
    <div class="card skew">Skew</div>
    <!-- <div class="card perspective">3D Perspective</div> -->
  </div>
</body>
</html>
